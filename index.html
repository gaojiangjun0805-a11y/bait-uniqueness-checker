<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="百棋大战全局诱饵唯一解校验器">
    <title>百棋大战 · 唯一解校验器</title>
    <script  src="/coi-serviceworker.js"></script>
    <script type="module" crossorigin src="/assets/index-Be3LAUZp.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/game-engine-D7B986-e.js">
    <link rel="stylesheet" crossorigin href="/assets/index-D-3fE2vS.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="hero">
        <p class="eyebrow">百棋大战 · 出题工具</p>
        <h1>全局诱饵唯一解校验器</h1>
        <p class="hero-copy">直接在同一张三层棋盘上落子；每一格会实时显示安全或被攻击次数，并可验证是否唯一解。</p>
      </header>

      <section class="workspace" aria-label="布局编辑器">
        <aside class="control-panel">
          <div>
            <p class="section-kicker">第一步</p>
            <h2>选择并落子</h2>
            <p class="muted">每层 1–3 枚；必须包含 1 王、1 后，以及 3 枚车/马/象。</p>
          </div>

          <div id="piece-palette" class="piece-palette" role="group" aria-label="棋子类型">
            <button class="piece-choice selected" type="button" data-piece="king"><span>王</span><small>必须 1 枚</small></button>
            <button class="piece-choice" type="button" data-piece="queen"><span>后</span><small>必须 1 枚</small></button>
            <button class="piece-choice" type="button" data-piece="rook"><span>车</span><small>最多 2 枚</small></button>
            <button class="piece-choice" type="button" data-piece="knight"><span>马</span><small>最多 2 枚</small></button>
            <button class="piece-choice" type="button" data-piece="bishop"><span>象</span><small>最多 2 枚</small></button>
          </div>

          <div id="layout-status" class="layout-status" aria-live="polite"></div>

          <div class="button-stack">
            <button id="analyze-button" class="primary-button" type="button">验证当前诱饵是否唯一</button>
            <button id="clear-button" class="secondary-button" type="button">清空布局</button>
          </div>
        </aside>

        <section class="board-panel">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">你的布局</p>
              <h2>三层埋伏棋盘</h2>
            </div>
            <p class="instruction">点空格落子；点已有棋子即可移除。</p>
          </div>
          <div id="placement-boards" class="layers"></div>
        </section>
      </section>

      <section id="result-section" class="result-section hidden" aria-live="polite">
        <div id="result-card" class="result-card"></div>
        <section id="alternative-section" class="alternative-panel hidden">
          <div class="panel-heading compact"><div><p class="section-kicker">反例布局</p><h2>另一套合法解</h2></div></div>
          <div id="alternative-boards" class="layers feedback-layers"></div>
        </section>
      </section>
    </main>
    <script  src="/z3-built.js"></script>
  </body>
</html>
